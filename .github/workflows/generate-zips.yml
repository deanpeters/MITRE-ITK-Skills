name: Regenerate skill zips

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "claude-skills/**"
      - "scripts/generate-zips.py"

jobs:
  generate-zips:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate zip files
        run: python3 scripts/generate-zips.py

      - name: Commit updated zips
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate skill zips [skip ci]"
          file_pattern: "dist/zips/*.zip"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
